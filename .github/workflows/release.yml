name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+.*"
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+.*"
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false
        description: "push to RubyGems (default off = dry-run)"
  # Full-matrix DRY-RUN on demand: add the `dry-run-release` label to a PR to
  # build every precompiled leg (publish stays off) without cutting a tag.
  # workflow_dispatch can't reach a workflow that isn't on the default branch
  # yet, so a labeled PR is how we validate the release pipeline pre-merge.
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write

jobs:
  release:
    # tags + manual dispatch always run; PRs run only when explicitly labelled
    # (the matrix is expensive — opt in per PR rather than on every push).
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'dry-run-release') }}
    uses: scientist-labs/rust-gem-release/.github/workflows/release.yml@0.10.0
    with:
      gem-name: tokenkit
      version-command: ruby -r./lib/tokenkit/version -e 'print TokenKit::VERSION'
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    secrets:
      rubygems-api-key: ${{ secrets.RUBYGEMS_API_KEY }}
