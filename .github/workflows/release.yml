name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+.*"
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+.*"
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false
        description: "push to RubyGems (default off = dry-run)"

permissions:
  contents: write

jobs:
  release:
    uses: scientist-labs/rust-gem-release/.github/workflows/release.yml@v0
    with:
      gem-name: tokenkit
      version-command: ruby -r./lib/tokenkit/version -e 'print TokenKit::VERSION'
      publish: ${{ github.event_name == 'push' || inputs.publish }}
    secrets:
      rubygems-api-key: ${{ secrets.RUBYGEMS_API_KEY }}
